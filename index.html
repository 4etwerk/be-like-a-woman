<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">

<title>be like a woman</title>

<link href="https://fonts.googleapis.com/css2?family=Italiana&family=Cormorant:ital,wght@0,300;1,300;1,400&display=swap" rel="stylesheet">

<style>

*, *::before, *::after {
 box-sizing:border-box;
 margin:0;
 padding:0;
}

:root {
 --amber:#d4894a;
 --cream:#fff2d8;
 --rust:#8a3e12;
}

body {
 overflow:hidden;
 background:#000;
 font-family:"Cormorant",serif;
 touch-action:none;
 user-select:none;
 -webkit-user-select:none;
}

canvas {
 position:absolute;
 inset:0;
 display:block;
}

#hint {
 position:fixed;
 bottom:70px;
 width:100%;
 text-align:center;
 font-size:clamp(12px,3.5vw,17px);
 letter-spacing:.2em;
 color:rgba(255,235,195,.4);
 font-style:italic;
 pointer-events:none;
 transition:opacity 1.5s;
 z-index:20;
}

#hint.gone {
 opacity:0;
}

#lyric-wrap {
 position:absolute;
 top:18%;
 width:100%;
 text-align:center;
 pointer-events:none;
 z-index:20;
 padding:0 16px;
}


#lyric {

 display:inline-block;
 font-family:"Italiana",serif;
 font-size:clamp(26px,6.5vw,64px);

 color:var(--cream);

 text-shadow:
 0 0 18px var(--amber),
 0 0 55px var(--rust),
 0 0 120px rgba(120,45,5,.4);

 opacity:0;

 transform:
 translateY(22px)
 scale(.97);

 transition:
 opacity 1.1s cubic-bezier(.22,1,.36,1),
 transform 1.1s cubic-bezier(.22,1,.36,1);

 letter-spacing:.08em;
 line-height:1.25;
}


#lyric.show {

 opacity:1;

 transform:
 translateY(0)
 scale(1);

}


#next {

 display:block;

 margin-top:16px;

 font-family:"Cormorant",serif;

 font-style:italic;

 font-size:
 clamp(13px,3vw,26px);

 color:
 rgba(255,235,195,.25);

 letter-spacing:.1em;

}




#controls {

 position:fixed;

 bottom:28px;

 left:50%;

 transform:
 translateX(-50%);

 display:flex;

 gap:16px;

 z-index:30;

 opacity:0;

 transition:
 opacity 1s;

}


#controls.visible {

 opacity:1;

}



.btn {

 width:56px;

 height:56px;

 border-radius:50%;

 border:
 1px solid rgba(210,150,70,.35);

 background:
 rgba(0,0,0,.55);

 backdrop-filter:blur(6px);

 color:
 rgba(255,220,160,.7);

 font-size:22px;

 display:flex;

 align-items:center;

 justify-content:center;

 touch-action:manipulation;

}


.btn:active {

 transform:scale(.9);

 border-color:
 var(--amber);

}



#vignette {

 position:fixed;

 inset:0;

 pointer-events:none;

 z-index:10;

 background:
 radial-gradient(
 ellipse at 50% 60%,
 transparent 35%,
 rgba(0,0,0,.68) 100%
 );

}


</style>

</head>


<body>


<canvas id="canvas"></canvas>

<div id="vignette"></div>


<div id="lyric-wrap">

<span id="lyric"></span>

<span id="next"></span>

</div>


<div id="hint">

tap anywhere to play

</div>


<div id="controls">

<div class="btn" id="btn-left">◀</div>

<div class="btn" id="btn-gas">▲</div>

<div class="btn" id="btn-moon">☽</div>

<div class="btn" id="btn-right">▶</div>

</div>


<audio 
id="music"
src="music.mp3"
preload="auto"
playsinline>
</audio>


<script>


const canvas =
document.getElementById("canvas");


const ctx =
canvas.getContext("2d");


const lyricEl =
document.getElementById("lyric");


const nextEl =
document.getElementById("next");


const hintEl =
document.getElementById("hint");


const controls =
document.getElementById("controls");


const music =
document.getElementById("music");



function resize(){

 canvas.width=innerWidth;

 canvas.height=innerHeight;

}


resize();


window.addEventListener(
"resize",
resize
);



function getElapsed(){

 return music.currentTime || 0;

}
const lyrics=[
{t:25,text:"Show me the light"},
{t:28,text:"Tell me a story"},
{t:31,text:"And make it a good one"},
{t:37,text:"Out of the night"},
{t:40,text:"Into a new day"},
{t:43,text:"Under the hot sun"},
{t:49,text:"Stay out a night"},
{t:52,text:"See who you wanna see, yeah"},
{t:61,text:"Do what you want"},
{t:64,text:"But be like a woman to me"},
{t:70,text:"Oh, oh"},
{t:73,text:"Give all you've got"},
{t:76,text:"Under the moonlight"},
{t:79,text:"It's yours for the taking"},
{t:85,text:"Don't turn around"},
{t:88,text:"If you hear a sound"},
{t:91,text:"It's just my heart breaking, yeah"},
{t:97,text:"Do what you want"},
{t:99,text:"But save the last dance for me, yeah"},
{t:109,text:"Love is alright"},
{t:111,text:"But be like a woman to me"},
{t:116,text:"Be like a woman"},
{t:121,text:"Oh, oh, oh"},
{t:127,text:"Touching me under the starlight"},
{t:132,text:"Love in a warm summer breeze"},
{t:138,text:"Holding me when I don't feel right"},
{t:144,text:"This love is made out of times like these"},
{t:186,text:"Do what you want"},
{t:188,text:"But save the last dance for me, yeah"},
{t:198,text:"Love is alright"},
{t:200,text:"But be like a woman to me"},
{t:207,text:"Oh, oh"},
{t:209,text:"Stay out a night"},
{t:212,text:"See who you wanna see, yeah"},
{t:221,text:"Do what you want"},
{t:224,text:"But be like a woman to me"},
{t:233,text:"Do what you want"},
{t:235,text:"But save the last dance for me, yeah"},
{t:245,text:"Love is alright"},
{t:247,text:"But be like a woman to me"}
];


let lastText="";


function updateLyrics(){

const t=getElapsed();

const instrumental =
t>144 && t<186;


let now="";
let nxt="";


for(let i=0;i<lyrics.length;i++){

if(t>=lyrics[i].t){

now=lyrics[i].text;

nxt=lyrics[i+1]?.text || "";

}

}


if(now!==lastText){

lyricEl.classList.remove("show");


const cap=now;


setTimeout(()=>{


lyricEl.textContent=cap;


if(cap && !instrumental){

lyricEl.classList.add("show");

}


},280);


lastText=now;

}



nextEl.textContent =
(!instrumental && nxt)
?nxt:"";


nextEl.style.opacity =
(!instrumental && nxt)
?"1":"0";


if(instrumental){

lyricEl.classList.remove("show");

}

}



let speed=1;

let speedTarget=1;

let carOffsetX=0;

let carOffsetTarget=0;

let shakeAmt=0;

let skyMode=0;

let moonFlash=0;

let steerLeft=false;

let steerRight=false;



function doGas(){

speedTarget =
Math.min(
speedTarget+1.5,
7
);


shakeAmt=9;


setTimeout(()=>{


speedTarget =
Math.max(
1,
speedTarget-1.5
);


},2000);

}




function toggleSky(){

skyMode =
(skyMode+1)%3;


moonFlash=1;

}




document
.getElementById("btn-gas")
.addEventListener(
"click",
e=>{

e.stopPropagation();

doGas();

}
);



document
.getElementById("btn-moon")
.addEventListener(
"click",
e=>{

e.stopPropagation();

toggleSky();

}
);




function attachSteer(btn,dir){


btn.addEventListener(
"pointerdown",
e=>{

e.stopPropagation();

if(dir==="L"){

steerLeft=true;

}

else{

steerRight=true;

}

}
);



btn.addEventListener(
"pointerup",
()=>{

steerLeft=false;

steerRight=false;

}
);


btn.addEventListener(
"pointerleave",
()=>{

steerLeft=false;

steerRight=false;

}
);

}



attachSteer(
document.getElementById("btn-left"),
"L"
);


attachSteer(
document.getElementById("btn-right"),
"R"
);




document.addEventListener(
"mousemove",
e=>{


const cx=
innerWidth/2;


carOffsetTarget =
((e.clientX-cx)/cx)*60;


}
);





let started=false;


async function start(){


if(started)return;


try{


await music.play();


started=true;


hintEl.classList.add("gone");


controls.classList.add("visible");


}


catch(e){


hintEl.textContent=
"tap again to play";


}


}



document.body.addEventListener(
"click",
start
);


document.body.addEventListener(
"touchend",
start,
{passive:true}
);
const stars =
Array.from({length:320},()=>({
x:Math.random()*innerWidth,
y:Math.random()*innerHeight*.52,
r:Math.random()*1.5+.2,
phase:Math.random()*Math.PI*2,
speed:.018+Math.random()*.025
}));


const lamps =
Array.from(
{length:22},
(_,i)=>({y:i*80})
);


const skies=[
["#02020c","#100703","#1c0a04","#000"],
["#04020f","#0e0420","#1a0630","#000"],
["#050112","#2a0a20","#6b1a10","#150200"]
];


let frame=0;


function draw(){

frame++;


speed+=(speedTarget-speed)*.055;

shakeAmt*=.87;


if(moonFlash>0){

moonFlash-=.045;

}


if(steerLeft){

carOffsetTarget=
Math.max(
carOffsetTarget-3,
-60
);

}


if(steerRight){

carOffsetTarget=
Math.min(
carOffsetTarget+3,
60
);

}


if(!steerLeft&&!steerRight){

carOffsetTarget*=.92;

}



carOffsetX+=
(carOffsetTarget-carOffsetX)*.07;



const W=canvas.width;

const H=canvas.height;



const sky=
ctx.createLinearGradient(
0,0,0,H
);


let pal=skies[skyMode];


sky.addColorStop(0,pal[0]);
sky.addColorStop(.42,pal[1]);
sky.addColorStop(.72,pal[2]);
sky.addColorStop(1,pal[3]);


ctx.fillStyle=sky;

ctx.fillRect(0,0,W,H);




for(const s of stars){

s.phase+=s.speed;

ctx.globalAlpha=
.4+Math.sin(s.phase)*.6;


ctx.fillStyle="#fff8ee";


ctx.beginPath();

ctx.arc(
s.x,
s.y,
s.r,
0,
Math.PI*2
);

ctx.fill();

}


ctx.globalAlpha=1;




ctx.shadowBlur=60;

ctx.shadowColor="#ffe0a0";

ctx.fillStyle="#fff4d6";


ctx.beginPath();

ctx.arc(
W*.82,
H*.18,
52,
0,
Math.PI*2
);


ctx.fill();

ctx.shadowBlur=0;




ctx.fillStyle="#06030a";

ctx.beginPath();

ctx.moveTo(0,H*.55);


for(let x=0;x<=W;x+=40){

ctx.lineTo(
x,
H*.52-
Math.sin(x*.02)*20
);

}


ctx.lineTo(W,H);

ctx.lineTo(0,H);

ctx.fill();




ctx.fillStyle="#060403";

ctx.beginPath();


ctx.moveTo(W*.13,H);

ctx.lineTo(W*.42,H*.54);

ctx.lineTo(W*.58,H*.54);

ctx.lineTo(W*.87,H);


ctx.fill();




ctx.strokeStyle=
"rgba(255,200,100,.5)";


ctx.lineWidth=3;


ctx.setLineDash([50,60]);


ctx.lineDashOffset=
-(frame*7*speed)%110;


ctx.beginPath();

ctx.moveTo(W/2,H*.55);

ctx.lineTo(W/2,H);

ctx.stroke();


ctx.setLineDash([]);




let carX=
W/2+carOffsetX;


let carY=
H*.77;


ctx.fillStyle=
"rgba(0,0,0,.65)";


ctx.beginPath();


ctx.ellipse(
carX,
carY+75,
115,
22,
0,
0,
Math.PI*2
);


ctx.fill();





ctx.fillStyle="#0a0808";


ctx.beginPath();


ctx.roundRect(
carX-100,
carY,
200,
68,
26
);


ctx.fill();





ctx.fillStyle="#090707";


ctx.beginPath();


ctx.roundRect(
carX-58,
carY-48,
116,
62,
22
);


ctx.fill();





ctx.fillStyle=
"rgba(90,65,45,.55)";


ctx.beginPath();


ctx.roundRect(
carX-46,
carY-38,
92,
36,
10
);


ctx.fill();






ctx.shadowBlur=28;

ctx.shadowColor=
"rgba(220,20,20,.9)";


ctx.fillStyle=
"rgba(200,18,18,.9)";


ctx.beginPath();

ctx.roundRect(
carX-82,
carY+38,
32,
14,
4
);

ctx.fill();



ctx.beginPath();

ctx.roundRect(
carX+50,
carY+38,
32,
14,
4
);

ctx.fill();


ctx.shadowBlur=0;






ctx.shadowBlur=25;

ctx.shadowColor="#ffe8c0";

ctx.fillStyle="#fff5e0";


ctx.beginPath();

ctx.roundRect(
carX-82,
carY+16,
22,
10,
4
);


ctx.fill();



ctx.beginPath();

ctx.roundRect(
carX+60,
carY+16,
22,
10,
4
);


ctx.fill();


ctx.shadowBlur=0;




updateLyrics();


requestAnimationFrame(draw);

}



draw();




if(!CanvasRenderingContext2D.prototype.roundRect){

CanvasRenderingContext2D.prototype.roundRect=
function(x,y,w,h,r){


this.moveTo(x+r,y);

this.lineTo(x+w-r,y);

this.quadraticCurveTo(
x+w,y,
x+w,y+r
);


this.lineTo(
x+w,
y+h-r
);


this.quadraticCurveTo(
x+w,y+h,
x+w-r,y+h
);


this.lineTo(
x+r,
y+h
);


this.quadraticCurveTo(
x,y+h,
x,y+h-r
);


this.lineTo(
x,
y+r
);


this.quadraticCurveTo(
x,y,
x+r,y
);


this.closePath();


return this;

};

}

</script>

</body>

</html>
