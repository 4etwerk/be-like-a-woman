<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>be like a woman</title>
<link href="https://fonts.googleapis.com/css2?family=Italiana&family=Cormorant:ital,wght@0,300;1,300;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --amber: #d4894a;
    --cream: #fff2d8;
    --rust:  #8a3e12;
  }

  body {
    overflow: hidden;
    background: #000;
    font-family: "Cormorant", serif;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }

  canvas { position: absolute; inset: 0; display: block; }

  #hint {
    position: fixed;
    bottom: 70px;
    width: 100%;
    text-align: center;
    font-size: clamp(12px, 3.5vw, 17px);
    letter-spacing: .2em;
    color: rgba(255,235,195,.4);
    font-style: italic;
    pointer-events: none;
    transition: opacity 1.5s;
    z-index: 20;
  }
  #hint.gone { opacity: 0; }

  #lyric-wrap {
    position: absolute;
    top: 18%;
    width: 100%;
    text-align: center;
    pointer-events: none;
    z-index: 20;
    padding: 0 16px;
  }
  #lyric {
    display: inline-block;
    font-family: "Italiana", serif;
    font-size: clamp(26px, 6.5vw, 64px);
    font-weight: 400;
    color: var(--cream);
    text-shadow: 0 0 18px var(--amber), 0 0 55px var(--rust), 0 0 120px rgba(120,45,5,.4);
    opacity: 0;
    transform: translateY(22px) scale(.97);
    transition: opacity 1.1s cubic-bezier(.22,1,.36,1), transform 1.1s cubic-bezier(.22,1,.36,1);
    letter-spacing: .08em;
    line-height: 1.25;
  }
  #lyric.show { opacity: 1; transform: translateY(0) scale(1); }
  #next {
    display: block;
    margin-top: 16px;
    font-family: "Cormorant", serif;
    font-style: italic;
    font-weight: 300;
    font-size: clamp(13px, 3vw, 26px);
    color: rgba(255,235,195,.25);
    letter-spacing: .1em;
    transition: opacity .8s;
  }

  #controls {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 16px;
    z-index: 30;
    opacity: 0;
    transition: opacity 1s;
  }
  #controls.visible { opacity: 1; }

  .btn {
    width: 56px; height: 56px;
    border-radius: 50%;
    border: 1px solid rgba(210,150,70,.35);
    background: rgba(0,0,0,.55);
    backdrop-filter: blur(6px);
    color: rgba(255,220,160,.7);
    font-size: 22px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: border-color .2s, transform .1s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .btn:active { transform: scale(.9); border-color: var(--amber); }

  #vignette {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 10;
    background: radial-gradient(ellipse at 50% 60%, transparent 35%, rgba(0,0,0,.68) 100%);
  }
</style>
</head>
<body>

<<canvas id="canvas"></canvas>
<div id="vignette"></div>

<div id="lyric-wrap">
  <span id="lyric"></span>
  <span id="next"></span>
</div>

<div id="hint">tap anywhere to play</div>

<div id="controls">
  <div class="btn" id="btn-left"  title="Steer left">◀</div>
  <div class="btn" id="btn-gas"   title="Gas">▲</div>
  <div class="btn" id="btn-moon"  title="Toggle sky">☽</div>
  <div class="btn" id="btn-right" title="Steer right">▶</div>
</div>

<audio id="music" src="music.mp3" preload="auto" playsinline></audio>

<script>
const canvas  = document.getElementById('canvas');
const ctx     = canvas.getContext('2d');
const lyricEl = document.getElementById('lyric');
const nextEl  = document.getElementById('next');
const hintEl  = document.getElementById('hint');
const controls= document.getElementById('controls');
const music   = document.getElementById('music');

function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
resize();
window.addEventListener('resize', resize);

const stars = Array.from({ length: 320 }, () => ({
  x: Math.random() * innerWidth,
  y: Math.random() * innerHeight * 0.52,
  r: Math.random() * 1.5 + 0.2,
  phase: Math.random() * Math.PI * 2,
  speed: 0.018 + Math.random() * 0.025,
}));

const lamps = Array.from({ length: 22 }, (_, i) => ({ y: i * 80 }));

const lyrics = [
  {t:25,  text:"Show me the light"},
  {t:28,  text:"Tell me a story"},
  {t:31,  text:"And make it a good one"},
  {t:37,  text:"Out of the night"},
  {t:40,  text:"Into a new day"},
  {t:43,  text:"Under the hot sun"},
  {t:49,  text:"Stay out a night"},
  {t:52,  text:"See who you wanna see, yeah"},
  {t:61,  text:"Do what you want"},
  {t:64,  text:"But be like a woman to me"},
  {t:70,  text:"Oh, oh"},
  {t:73,  text:"Give all you've got"},
  {t:76,  text:"Under the moonlight"},
  {t:79,  text:"It's yours for the taking"},
  {t:85,  text:"Don't turn around"},
  {t:88,  text:"If you hear a sound"},
  {t:91,  text:"It's just my heart breaking, yeah"},
  {t:97,  text:"Do what you want"},
  {t:99,  text:"But save the last dance for me, yeah"},
  {t:109, text:"Love is alright"},
  {t:111, text:"But be like a woman to me"},
  {t:116, text:"Be like a woman"},
  {t:121, text:"Oh, oh, oh"},
  {t:127, text:"Touching me under the starlight"},
  {t:132, text:"Love in a warm summer breeze"},
  {t:138, text:"Holding me when I don't feel right"},
  {t:144, text:"This love is made out of times like these"},
  {t:186, text:"Do what you want"},
  {t:188, text:"But save the last dance for me, yeah"},
  {t:198, text:"Love is alright"},
  {t:200, text:"But be like a woman to me"},
  {t:207, text:"Oh, oh"},
  {t:209, text:"Stay out a night"},
  {t:212, text:"See who you wanna see, yeah"},
  {t:221, text:"Do what you want"},
  {t:224, text:"But be like a woman to me"},
  {t:233, text:"Do what you want"},
  {t:235, text:"But save the last dance for me, yeah"},
  {t:245, text:"Love is alright"},
  {t:247, text:"But be like a woman to me"},
];

let playStartTime = null, playOffset = 0;
function getElapsed() {
  if (playStartTime === null) return 0;
  return playOffset + (performance.now() - playStartTime) / 1000;
}
music.addEventListener('playing', () => { playOffset = music.currentTime; playStartTime = performance.now(); });
music.addEventListener('waiting', () => { playStartTime = null; });
music.addEventListener('seeked',  () => { playOffset = music.currentTime; playStartTime = performance.now(); });

let lastText = '';
function updateLyrics() {
  const t = getElapsed();
  const instrumental = t > 144 && t < 186;
  let now = '', nxt = '';
  for (let i = 0; i < lyrics.length; i++) {
    if (t >= lyrics[i].t) { now = lyrics[i].text; nxt = lyrics[i+1]?.text || ''; }
  }
  if (now !== lastText) {
    lyricEl.classList.remove('show');
    const cap = now;
    setTimeout(() => {
      lyricEl.textContent = cap;
      if (cap && !instrumental) lyricEl.classList.add('show');
    }, 280);
    lastText = now;
  }
  nextEl.textContent   = (!instrumental && nxt) ? nxt : '';
  nextEl.style.opacity = (!instrumental && nxt) ? '1' : '0';
  if (instrumental) lyricEl.classList.remove('show');
}

let speed           = 1;
let speedTarget     = 1;
let carOffsetX      = 0;
let carOffsetTarget = 0;
let shakeAmt        = 0;
let skyMode         = 0;   
let moonFlash       = 0;
let steerLeft       = false;
let steerRight      = false;

function doGas() {
  speedTarget = Math.min(speedTarget + 1.5, 7);
  shakeAmt = 9;
  setTimeout(() => { speedTarget = Math.max(1, speedTarget - 1.5); }, 2000);
}

function toggleSky() {
  skyMode = (skyMode + 1) % 3;
  moonFlash = 1;
}

document.getElementById('btn-gas').addEventListener('click', e => { e.stopPropagation(); doGas(); });
document.getElementById('btn-moon').addEventListener('click', e => { e.stopPropagation(); toggleSky(); });

const btnL = document.getElementById('btn-left');
const btnR = document.getElementById('btn-right');

function attachSteer(btn, dir) {
  btn.addEventListener('pointerdown', e => { e.stopPropagation(); dir === 'L' ? steerLeft = true : steerRight = true; });
  btn.addEventListener('pointerup',   () => { dir === 'L' ? steerLeft = false : steerRight = false; });
  btn.addEventListener('pointerleave',() => { dir === 'L' ? steerLeft = false : steerRight = false; });
}
attachSteer(btnL, 'L');
attachSteer(btnR, 'R');

document.addEventListener('mousemove', e => {
  const cx = innerWidth / 2;
  carOffsetTarget = ((e.clientX - cx) / cx) * 60;
});

function handleTap(cx, cy) {
  if (!started) return;
  const W = canvas.width, H = canvas.height;
  // car zone
  const cX = W/2 + carOffsetX, cY = H * 0.77;
  if (Math.abs(cx - cX) < 120 && cy > cY - 60 && cy < cY + 85) { doGas(); return; }
  // moon zone (top-right quadrant)
  const mX = W * 0.82, mY = H * 0.18;
  if (Math.hypot(cx - mX, cy - mY) < 80) { toggleSky(); return; }
}

canvas.addEventListener('click', e => handleTap(e.clientX, e.clientY));
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  const t = e.changedTouches[0];
  handleTap(t.clientX, t.clientY);
}, { passive: false });

let started = false;
function start() {
  if (started) return;
  started = true;
  const p = music.play();
  if (p !== undefined) p.catch(() => setTimeout(() => music.play().catch(() => {}), 50));
  hintEl.classList.add('gone');
  controls.classList.add('visible');
}
document.body.addEventListener('pointerdown', start, { once: true });
document.body.addEventListener('touchend', start, { once: true, passive: false });
document.body.addEventListener('click', start, { once: true });

const skies = [
  // 0: night
  ['#02020c','#100703','#1c0a04','#000'],
  // 1: deep violet night
  ['#04020f','#0e0420','#1a0630','#000'],
  // 2: dawn blush
  ['#050112','#2a0a20','#6b1a10','#150200'],
];
const moonColors  = ['#fff4d6','#d0b0ff','#ff9060'];
const moonShadows = ['#ffe0a0','#9060ff','#ff5010'];
const haloColors  = ['rgba(255,220,160,0.16)','rgba(160,80,255,0.18)','rgba(255,100,20,0.2)'];

let frame = 0, moonPulse = 0;

function draw() {
  frame++;
  moonPulse += 0.012;

  speed      += (speedTarget - speed) * 0.055;
  shakeAmt   *= 0.87;
  if (moonFlash > 0) moonFlash -= 0.045;

  if (steerLeft)  carOffsetTarget = Math.max(carOffsetTarget - 3, -60);
  if (steerRight) carOffsetTarget = Math.min(carOffsetTarget + 3,  60);
  if (!steerLeft && !steerRight) carOffsetTarget *= 0.92; // auto-centre on mobile
  carOffsetX += (carOffsetTarget - carOffsetX) * 0.07;

  const shakeX = (Math.random() - .5) * shakeAmt;
  const shakeY = (Math.random() - .5) * shakeAmt * 0.35;

  const W = canvas.width, H = canvas.height;
  const t = getElapsed();
  const instrumental = t > 144 && t < 186;
  const beat = 0.5 + Math.sin(frame * 0.055) * 0.5;

  const pal = skies[skyMode];
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0,    pal[0]);
  sky.addColorStop(0.42, pal[1]);
  sky.addColorStop(0.72, pal[2]);
  sky.addColorStop(1,    pal[3]);
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);

  const hY = H * 0.54;

  const hg = ctx.createRadialGradient(W/2, hY, 0, W/2, hY, W * 0.55);
  hg.addColorStop(0, `rgba(160,60,15,${0.14 + beat * 0.04})`);
  hg.addColorStop(1, 'transparent');
  ctx.fillStyle = hg; ctx.fillRect(0, hY - H*.2, W, H*.4);

  const moonR  = instrumental ? 78 : 52;
  const moonX  = W * 0.82, moonY = H * 0.18;
  const mc     = moonColors[skyMode];
  const ms     = moonShadows[skyMode];
  const halo   = ctx.createRadialGradient(moonX, moonY, moonR*.6, moonX, moonY, moonR*4);
  halo.addColorStop(0, haloColors[skyMode]); halo.addColorStop(1,'transparent');
  ctx.fillStyle = halo;
  ctx.beginPath(); ctx.arc(moonX, moonY, moonR*4, 0, Math.PI*2); ctx.fill();

  if (moonFlash > 0) {
    ctx.globalAlpha = moonFlash * 0.15;
    ctx.fillStyle = '#fff'; ctx.fillRect(0,0,W,H);
    ctx.globalAlpha = 1;
  }

  ctx.shadowBlur = 60 + Math.sin(moonPulse)*15; ctx.shadowColor = ms;
  ctx.fillStyle = mc;
  ctx.beginPath(); ctx.arc(moonX, moonY, moonR, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;

  const starBright = instrumental ? 1.0 : 0.55;
  for (const s of stars) {
    s.phase += s.speed;
    ctx.globalAlpha = Math.max(0, starBright * (0.4 + Math.sin(s.phase) * 0.6));
    ctx.fillStyle = '#fff8ee';
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  ctx.fillStyle = '#06030a';
  ctx.beginPath(); ctx.moveTo(0, hY+10);
  for (let x=0; x<=W; x+=40)
    ctx.lineTo(x, hY - 18*Math.sin(x*.009+1.3) - 10*Math.sin(x*.021+0.7));
  ctx.lineTo(W,H); ctx.lineTo(0,H); ctx.closePath(); ctx.fill();

  ctx.fillStyle = '#060403';
  ctx.beginPath();
  ctx.moveTo(W*.13, H); ctx.lineTo(W*.42, hY);
  ctx.lineTo(W*.58, hY); ctx.lineTo(W*.87, H);
  ctx.closePath(); ctx.fill();

  ctx.strokeStyle='rgba(200,120,40,.2)'; ctx.lineWidth=2;
  for (const side of [-1,1]) {
    ctx.beginPath();
    ctx.moveTo(W/2+side*W*.37, H); ctx.lineTo(W/2+side*W*.08, hY); ctx.stroke();
  }

  ctx.strokeStyle='rgba(255,200,100,.5)'; ctx.lineWidth=3;
  ctx.setLineDash([50,60]);
  ctx.lineDashOffset = -(frame*7*speed)%110;
  ctx.beginPath(); ctx.moveTo(W/2,hY+4); ctx.lineTo(W/2,H); ctx.stroke();
  ctx.setLineDash([]);

  for (const l of lamps) {
    const ly = (frame*3*speed + l.y) % H;
    if (ly < hY) continue;
    const sc  = (ly-hY)/(H-hY);
    const rad = 14*sc;
    const sp  = 130+sc*340;
    for (const side of [-1,1]) {
      const lx = W/2+side*sp;
      ctx.strokeStyle=`rgba(80,50,20,${sc*.5})`; ctx.lineWidth=2*sc;
      ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(lx,ly-rad*3); ctx.stroke();
      const lg=ctx.createRadialGradient(lx,ly,0,lx,ly,rad*4);
      lg.addColorStop(0,`rgba(255,175,80,${.7*sc})`); lg.addColorStop(1,'transparent');
      ctx.fillStyle=lg; ctx.beginPath(); ctx.arc(lx,ly,rad*4,0,Math.PI*2); ctx.fill();
      ctx.shadowBlur=30*sc; ctx.shadowColor='#ffa040'; ctx.fillStyle='#ffb84a';
      ctx.beginPath(); ctx.arc(lx,ly,rad,0,Math.PI*2); ctx.fill();
      ctx.shadowBlur=0;
    }
  }

  if (speed > 2.5) {
    const alpha = Math.min((speed-2.5)/4, 0.18);
    ctx.strokeStyle = `rgba(255,200,120,${alpha})`;
    ctx.lineWidth = 1;
    for (let i=0; i<<12; i++) {
      const lx = W*.15 + Math.random()*W*.7;
      const len = 18 + Math.random()*40;
      ctx.beginPath(); ctx.moveTo(lx, hY + Math.random()*(H-hY));
      ctx.lineTo(lx, ctx.beginPath(), lx); // just streaks
      ctx.moveTo(lx, hY+Math.random()*(H-hY)*0.8);
      ctx.lineTo(lx+len*0.1, hY+Math.random()*(H-hY)*0.9);
      ctx.stroke();
    }
  }

  const carX = W/2 + carOffsetX + shakeX;
  const carY = H*.77 + Math.sin(frame*.045)*4 + shakeY;
  const cW=200, cH=68;

  ctx.save();
  ctx.translate(carX, carY+cH/2);
  const lean = carOffsetTarget * 0.003;
  ctx.rotate(lean);
  ctx.translate(-carX, -(carY+cH/2));

  const tg=ctx.createRadialGradient(carX,carY+90,0,carX,carY+90,140);
  tg.addColorStop(0,'rgba(180,70,10,.18)'); tg.addColorStop(1,'transparent');
  ctx.fillStyle=tg; ctx.fillRect(carX-150,carY+20,300,120);

  ctx.fillStyle='rgba(0,0,0,.65)';
  ctx.beginPath(); ctx.ellipse(carX,carY+75,115,22,0,0,Math.PI*2); ctx.fill();

  for (const side of [-1,1]) {
    const bx=carX+side*75;
    const b=ctx.createRadialGradient(bx,carY+50,2,bx,carY+50,280);
    b.addColorStop(0,'rgba(255,245,200,.12)'); b.addColorStop(1,'transparent');
    ctx.fillStyle=b;
    ctx.beginPath(); ctx.moveTo(bx,carY+50);
    ctx.lineTo(bx+side*200,carY-120); ctx.lineTo(bx+side*60,carY-120);
    ctx.closePath(); ctx.fill();
  }

  ctx.fillStyle='#0a0808';
  ctx.beginPath(); ctx.roundRect(carX-cW/2,carY,cW,cH,26); ctx.fill();

  ctx.strokeStyle='rgba(180,130,60,.3)'; ctx.lineWidth=1.5;
  ctx.beginPath();
  ctx.moveTo(carX-cW/2+20,carY+cH*.55); ctx.lineTo(carX+cW/2-20,carY+cH*.55); ctx.stroke();

  ctx.fillStyle='#090707';
  ctx.beginPath(); ctx.roundRect(carX-58,carY-48,116,62,22); ctx.fill();

  ctx.fillStyle='rgba(90,65,45,.55)';
  ctx.beginPath(); ctx.roundRect(carX-46,carY-38,92,36,10); ctx.fill();

  ctx.fillStyle=`rgba(255,200,100,${.04+beat*.04})`;
  ctx.beginPath(); ctx.roundRect(carX-30,carY-36,28,32,6); ctx.fill();

  const braking = speedTarget < speed - 0.3;
  ctx.shadowBlur  = (braking ? 45 : 28) + beat*12;
  ctx.shadowColor = 'rgba(220,20,20,.9)';
  ctx.fillStyle   = `rgba(200,18,18,${braking ? 1 : 0.85+beat*.15})`;
  ctx.beginPath(); ctx.roundRect(carX-82,carY+38,32,14,4); ctx.fill();
  ctx.beginPath(); ctx.roundRect(carX+50,carY+38,32,14,4); ctx.fill();
  ctx.shadowBlur=0;

  ctx.shadowBlur=25; ctx.shadowColor='#ffe8c0'; ctx.fillStyle='#fff5e0';
  ctx.beginPath(); ctx.roundRect(carX-82,carY+16,22,10,4); ctx.fill();
  ctx.beginPath(); ctx.roundRect(carX+60,carY+16,22,10,4); ctx.fill();
  ctx.shadowBlur=0;

  ctx.restore();

  ctx.fillStyle='rgba(120,55,12,.07)'; ctx.fillRect(0,0,W,H);

  if (frame%4===0) {
    ctx.fillStyle='rgba(255,200,100,.02)';
    ctx.fillRect(0,Math.floor(Math.random()*H),W,1);
  }

  updateLyrics();
  requestAnimationFrame(draw);
}

draw();

if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r) {
    r=Math.min(r,w/2,h/2);
    this.moveTo(x+r,y); this.lineTo(x+w-r,y);
    this.quadraticCurveTo(x+w,y,x+w,y+r); this.lineTo(x+w,y+h-r);
    this.quadraticCurveTo(x+w,y+h,x+w-r,y+h); this.lineTo(x+r,y+h);
    this.quadraticCurveTo(x,y+h,x,y+h-r); this.lineTo(x,y+r);
    this.quadraticCurveTo(x,y,x+r,y); this.closePath(); return this;
  };
}
</script>
</body>
</html>
