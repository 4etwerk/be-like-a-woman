<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">

<title>be like a woman</title>

<link href="https://fonts.googleapis.com/css2?family=Italiana&family=Cormorant:ital,wght@0,300;1,300;1,400&display=swap" rel="stylesheet">

<style>
*,*::before,*::after{
box-sizing:border-box;
margin:0;
padding:0;
}

:root{
--amber:#d4894a;
--cream:#fff2d8;
--rust:#8a3e12;
}

body{
overflow:hidden;
background:#000;
font-family:"Cormorant",serif;
touch-action:none;
user-select:none;
-webkit-user-select:none;
}

canvas{
position:absolute;
inset:0;
display:block;
}

#hint{
position:fixed;
bottom:70px;
width:100%;
text-align:center;
font-size:clamp(12px,3.5vw,17px);
letter-spacing:.2em;
color:rgba(255,235,195,.4);
font-style:italic;
pointer-events:none;
transition:opacity 1.5s;
z-index:20;
}

#hint.gone{
opacity:0;
}

#lyric-wrap{
position:absolute;
top:18%;
width:100%;
text-align:center;
pointer-events:none;
z-index:20;
padding:0 16px;
}

#lyric{
display:inline-block;
font-family:"Italiana",serif;
font-size:clamp(26px,6.5vw,64px);
color:var(--cream);
text-shadow:
0 0 18px var(--amber),
0 0 55px var(--rust),
0 0 120px rgba(120,45,5,.4);
opacity:0;
transform:translateY(22px) scale(.97);
transition:
opacity 1.1s cubic-bezier(.22,1,.36,1),
transform 1.1s cubic-bezier(.22,1,.36,1);
letter-spacing:.08em;
line-height:1.25;
}

#lyric.show{
opacity:1;
transform:translateY(0) scale(1);
}

#next{
display:block;
margin-top:16px;
font-style:italic;
font-size:clamp(13px,3vw,26px);
color:rgba(255,235,195,.25);
}

#controls{
position:fixed;
bottom:28px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:16px;
z-index:30;
opacity:0;
transition:opacity 1s;
}

#controls.visible{
opacity:1;
}

.btn{
width:56px;
height:56px;
border-radius:50%;
border:1px solid rgba(210,150,70,.35);
background:rgba(0,0,0,.55);
color:rgba(255,220,160,.7);
font-size:22px;
display:flex;
align-items:center;
justify-content:center;
touch-action:manipulation;
}

#vignette{
position:fixed;
inset:0;
pointer-events:none;
z-index:10;
background:radial-gradient(
ellipse at 50% 60%,
transparent 35%,
rgba(0,0,0,.68) 100%);
}

</style>
</head>


<body>

<canvas id="canvas"></canvas>

<div id="vignette"></div>

<div id="lyric-wrap">
<span id="lyric"></span>
<span id="next"></span>
</div>

<div id="hint">tap anywhere to play</div>

<div id="controls">
<div class="btn" id="btn-left">◀</div>
<div class="btn" id="btn-gas">▲</div>
<div class="btn" id="btn-moon">☽</div>
<div class="btn" id="btn-right">▶</div>
</div>

<audio id="music"
src="music.mp3"
preload="auto"
playsinline></audio>


<script>

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

const lyricEl=document.getElementById("lyric");
const nextEl=document.getElementById("next");
const hintEl=document.getElementById("hint");
const controls=document.getElementById("controls");
const music=document.getElementById("music");


function resize(){
canvas.width=innerWidth;
canvas.height=innerHeight;
}

resize();
window.addEventListener("resize",resize);


function getElapsed(){
return music.currentTime||0;
}


let started=false;


async function start(){

if(started)return;

try{

await music.play();

started=true;

hintEl.classList.add("gone");
controls.classList.add("visible");

}

catch(e){

hintEl.textContent="tap again to play";

}

}


document.body.addEventListener("click",start);
document.body.addEventListener(
"touchend",
start,
{passive:true}
);
const lyrics=[
{t:25,text:"Show me the light"},
{t:28,text:"Tell me a story"},
{t:31,text:"And make it a good one"},
{t:37,text:"Out of the night"},
{t:40,text:"Into a new day"},
{t:43,text:"Under the hot sun"},
{t:49,text:"Stay out a night"},
{t:52,text:"See who you wanna see, yeah"},
{t:61,text:"Do what you want"},
{t:64,text:"But be like a woman to me"},
{t:70,text:"Oh, oh"},
{t:73,text:"Give all you've got"},
{t:76,text:"Under the moonlight"},
{t:79,text:"It's yours for the taking"},
{t:85,text:"Don't turn around"},
{t:88,text:"If you hear a sound"},
{t:91,text:"It's just my heart breaking, yeah"},
{t:97,text:"Do what you want"},
{t:99,text:"But save the last dance for me, yeah"},
{t:109,text:"Love is alright"},
{t:111,text:"But be like a woman to me"},
{t:116,text:"Be like a woman"},
{t:121,text:"Oh, oh, oh"},
{t:127,text:"Touching me under the starlight"},
{t:132,text:"Love in a warm summer breeze"},
{t:138,text:"Holding me when I don't feel right"},
{t:144,text:"This love is made out of times like these"},
{t:186,text:"Do what you want"},
{t:188,text:"But save the last dance for me, yeah"},
{t:198,text:"Love is alright"},
{t:200,text:"But be like a woman to me"},
{t:207,text:"Oh, oh"},
{t:209,text:"Stay out a night"},
{t:212,text:"See who you wanna see, yeah"},
{t:221,text:"Do what you want"},
{t:224,text:"But be like a woman to me"},
{t:233,text:"Do what you want"},
{t:235,text:"But save the last dance for me, yeah"},
{t:245,text:"Love is alright"},
{t:247,text:"But be like a woman to me"}
];


let lastText="";

function updateLyrics(){

let time=getElapsed();

let now="";
let next="";

for(let i=0;i<lyrics.length;i++){

if(time>=lyrics[i].t){

now=lyrics[i].text;
next=lyrics[i+1]?.text||"";

}

}


if(now!==lastText){

lyricEl.classList.remove("show");

setTimeout(()=>{

lyricEl.textContent=now;

if(now){
lyricEl.classList.add("show");
}

},280);

lastText=now;

}


nextEl.textContent=next;

}



let speed=1;
let carMove=0;
let skyMode=0;


const skies=[
["#02020c","#100703","#000"],
["#04020f","#1a0630","#000"],
["#050112","#6b1a10","#150200"]
];


document
.getElementById("btn-gas")
.onclick=e=>{

e.stopPropagation();
speed=5;

setTimeout(()=>{
speed=1;
},1500);

};


document
.getElementById("btn-moon")
.onclick=e=>{

e.stopPropagation();

skyMode++;

if(skyMode>2){
skyMode=0;
}

};


let left=false;
let right=false;


function steer(btn,side){

btn.onpointerdown=e=>{

e.stopPropagation();

if(side==="L")left=true;
else right=true;

};


btn.onpointerup=()=>{

left=false;
right=false;

};

}


steer(
document.getElementById("btn-left"),
"L"
);

steer(
document.getElementById("btn-right"),
"R"
);


document.addEventListener(
"mousemove",
e=>{

carMove=
(e.clientX-innerWidth/2)/10;

}
);



const stars=
Array.from(
{length:320},
()=>({

x:Math.random()*innerWidth,
y:Math.random()*innerHeight*.5,
r:Math.random()*1.5

})
);


let frame=0;


function draw(){

frame++;

if(left)carMove-=2;
if(right)carMove+=2;

const W=canvas.width;
const H=canvas.height;


let bg=ctx.createLinearGradient(0,0,0,H);

bg.addColorStop(0,skies[skyMode][0]);
bg.addColorStop(.5,skies[skyMode][1]);
bg.addColorStop(1,skies[skyMode][2]);

ctx.fillStyle=bg;
ctx.fillRect(0,0,W,H);


ctx.fillStyle="#fff8ee";

stars.forEach(s=>{

ctx.beginPath();
ctx.arc(
s.x,
s.y,
s.r,
0,
Math.PI*2
);

ctx.fill();

});


ctx.fillStyle="#fff4d6";

ctx.shadowBlur=60;
ctx.shadowColor="#ffe0a0";

ctx.beginPath();

ctx.arc(
W*.82,
H*.18,
52,
0,
Math.PI*2
);

ctx.fill();

ctx.shadowBlur=0;



ctx.fillStyle="#060403";

ctx.beginPath();

ctx.moveTo(W*.15,H);
ctx.lineTo(W*.43,H*.55);
ctx.lineTo(W*.57,H*.55);
ctx.lineTo(W*.85,H);

ctx.fill();



ctx.strokeStyle=
"rgba(255,200,100,.5)";

ctx.lineWidth=3;

ctx.setLineDash([50,60]);

ctx.lineDashOffset=
-(frame*7*speed)%110;

ctx.beginPath();

ctx.moveTo(W/2,H*.56);
ctx.lineTo(W/2,H);

ctx.stroke();

ctx.setLineDash([]);



let carX=W/2+carMove;
let carY=H*.77;


ctx.fillStyle="#0a0808";

ctx.beginPath();

ctx.roundRect(
carX-100,
carY,
200,
68,
26
);

ctx.fill();


ctx.fillStyle=
"rgba(90,65,45,.55)";

ctx.beginPath();

ctx.roundRect(
carX-46,
carY-38,
92,
36,
10
);

ctx.fill();


updateLyrics();


requestAnimationFrame(draw);

}


draw();


</script>

</body>
</html>
